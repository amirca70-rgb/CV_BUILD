<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CVPro AI — Professional CV Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{
  --pink:#FF6B9D;--purple:#7C5CFC;--teal:#4ECDC4;--orange:#FF9F43;
  --green:#26de81;--bg:#F7F8FF;--white:#fff;--dark:#1a1a2e;
  --gray:#6c757d;--light:#f0f2ff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}
body.ar{font-family:'Cairo',sans-serif;}

/* ── LANG SWITCHER ── */
.lang-switcher{display:flex;gap:4px;background:var(--light);border-radius:50px;padding:4px;}
.lbtn{border:none;background:transparent;padding:6px 13px;border-radius:50px;font-size:.76rem;font-weight:700;cursor:pointer;color:var(--gray);transition:all .2s;}
.lbtn.active{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;box-shadow:0 3px 10px rgba(124,92,252,.25);}

/* ── FREE BADGE ── */
.free-badge{
  padding:5px 14px;border-radius:50px;font-size:.74rem;font-weight:700;
  cursor:pointer;transition:all .2s;white-space:nowrap;border:none;
  background:rgba(38,222,129,.15);color:#1a8a4a;
}
.free-badge.low{background:rgba(255,107,107,.15);color:#c0392b;}
.free-badge.premium{background:linear-gradient(135deg,#f7971e,#ffd200);color:#333;}

/* ── TOP NAV ── */
.topnav{
  background:var(--white);border-bottom:2px solid var(--light);
  padding:0 20px;height:64px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 2px 16px rgba(124,92,252,.07);
}
.logo{font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;}
.nav-steps{display:flex;gap:4px;}
.nav-step{padding:7px 12px;border-radius:50px;font-size:.75rem;font-weight:700;cursor:pointer;border:none;background:var(--light);color:var(--gray);transition:all .2s;display:flex;align-items:center;gap:5px;}
.nav-step.active{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;box-shadow:0 4px 14px rgba(124,92,252,.3);}
.nav-step.done{background:#e8fff4;color:var(--green);}
.nav-step .num{width:19px;height:19px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:.65rem;}
.nav-right{display:flex;align-items:center;gap:8px;}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:400px 1fr;height:calc(100vh - 64px);}
.form-panel{background:var(--white);border-inline-end:2px solid var(--light);overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:16px;}

/* ── STEPS ── */
.step-card{display:none;}
.step-card.active{display:flex;flex-direction:column;gap:15px;animation:sIn .3s ease;}
@keyframes sIn{from{opacity:0;transform:translateX(14px);}to{opacity:1;transform:translateX(0);}}
.step-title{font-size:1.15rem;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.step-sub{font-size:.81rem;color:var(--gray);margin-top:2px;}

/* ── FIELDS ── */
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:.72rem;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;}
.field input,.field textarea{border:2px solid var(--light);border-radius:12px;padding:11px 14px;font-family:inherit;font-size:.88rem;color:var(--dark);background:var(--bg);outline:none;transition:border-color .2s,box-shadow .2s;width:100%;direction:ltr;text-align:left;}
.field input:focus,.field textarea:focus{border-color:var(--purple);box-shadow:0 0 0 4px rgba(124,92,252,.1);}
.field textarea{resize:vertical;min-height:72px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ── STANDARD CARDS ── */
.std-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.std-card{border:2px solid var(--light);border-radius:12px;padding:13px;cursor:pointer;transition:all .2s;text-align:center;background:var(--bg);}
.std-card:hover{border-color:var(--purple);transform:translateY(-2px);}
.std-card.selected{border-color:var(--purple);background:linear-gradient(135deg,rgba(124,92,252,.08),rgba(255,107,157,.05));box-shadow:0 4px 14px rgba(124,92,252,.14);}
.std-card .flag{font-size:1.8rem;margin-bottom:4px;}
.std-card strong{display:block;font-size:.81rem;font-weight:700;margin-bottom:2px;}
.std-card small{font-size:.68rem;color:var(--gray);}
.std-card .chk{display:none;color:var(--purple);font-size:.95rem;margin-top:3px;}
.std-card.selected .chk{display:block;}

/* ── PILLS ── */
.pills{display:flex;gap:6px;flex-wrap:wrap;}
.pill{padding:7px 15px;border-radius:50px;border:2px solid var(--light);cursor:pointer;font-size:.78rem;font-weight:700;background:var(--bg);color:var(--gray);transition:all .2s;}
.pill.selected{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(124,92,252,.22);}

/* ── SWATCHES ── */
.swatches{display:flex;gap:7px;flex-wrap:wrap;}
.swatch{width:28px;height:28px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .2s;}
.swatch.active,.swatch:hover{border-color:var(--dark);transform:scale(1.15);}

/* ── SECTION BLOCK ── */
.sec-block{background:var(--bg);border-radius:12px;padding:13px;border:2px solid var(--light);}
.sec-block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;}
.sec-block-head h4{font-size:.86rem;font-weight:700;}
.add-btn{background:linear-gradient(135deg,var(--purple),var(--pink));border:none;color:#fff;padding:6px 12px;border-radius:50px;font-family:inherit;font-size:.73rem;font-weight:700;cursor:pointer;transition:transform .2s;}
.add-btn:hover{transform:translateY(-1px);}

.item-pill{background:var(--white);border:1.5px solid var(--light);border-radius:9px;padding:9px 12px;display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.item-pill strong{font-size:.81rem;display:block;}
.item-pill small{font-size:.7rem;color:var(--gray);}
.del-btn{background:none;border:none;cursor:pointer;color:#ff6b6b;font-size:.9rem;padding:2px 5px;}

/* ── SKILL TAGS ── */
.skills-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.skill-tag{background:linear-gradient(135deg,rgba(124,92,252,.1),rgba(255,107,157,.1));border:1.5px solid rgba(124,92,252,.2);border-radius:50px;padding:4px 12px;font-size:.74rem;font-weight:700;color:var(--purple);display:flex;align-items:center;gap:5px;}
.skill-tag button{background:none;border:none;cursor:pointer;color:var(--pink);font-size:.8rem;}

/* ── AI BOX ── */
.ai-box{background:linear-gradient(135deg,rgba(124,92,252,.06),rgba(255,107,157,.06));border:2px solid rgba(124,92,252,.15);border-radius:12px;padding:13px;}
.ai-box-title{font-size:.81rem;font-weight:700;color:var(--purple);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
.ai-textarea{width:100%;border:2px solid rgba(124,92,252,.15);border-radius:9px;padding:10px;font-family:inherit;font-size:.81rem;background:var(--white);color:var(--dark);outline:none;resize:vertical;min-height:65px;direction:ltr;text-align:left;}
.ai-textarea:focus{border-color:var(--purple);}
.ai-result-box{background:var(--white);border:2px solid var(--green);border-radius:9px;padding:11px;font-size:.81rem;line-height:1.7;direction:ltr;text-align:left;margin-top:8px;display:none;min-height:46px;outline:none;}

/* ── BUTTONS ── */
.btn-main{background:linear-gradient(135deg,var(--purple),var(--pink));border:none;color:#fff;padding:12px 24px;border-radius:50px;font-family:inherit;font-size:.91rem;font-weight:700;cursor:pointer;width:100%;transition:all .2s;box-shadow:0 4px 14px rgba(124,92,252,.22);}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(124,92,252,.32);}
.btn-main:disabled{opacity:.6;pointer-events:none;}
.btn-sec{background:var(--light);border:none;color:var(--purple);padding:11px 22px;border-radius:50px;font-family:inherit;font-size:.86rem;font-weight:700;cursor:pointer;width:100%;transition:all .2s;}
.btn-sec:hover{background:#e0e4ff;}
.btn-ai{background:linear-gradient(135deg,var(--purple),var(--teal));border:none;color:#fff;padding:8px 15px;border-radius:50px;font-family:inherit;font-size:.77rem;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:5px;}
.btn-ai:hover{transform:translateY(-1px);}
.btn-ai:disabled{opacity:.6;pointer-events:none;}
.nav-btns{display:flex;gap:9px;}
.nav-btns .btn-main,.nav-btns .btn-sec{flex:1;}

/* ── PREVIEW ── */
.preview-panel{background:#e4e6f0;display:flex;flex-direction:column;overflow:hidden;}
.preview-toolbar{background:var(--white);border-bottom:2px solid var(--light);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
.preview-toolbar span{font-size:.78rem;color:var(--gray);font-weight:600;}
.toolbar-r{display:flex;gap:7px;align-items:center;}
.tbtn{border:2px solid var(--light);background:var(--white);border-radius:9px;padding:7px 12px;font-family:inherit;font-size:.76rem;font-weight:700;cursor:pointer;color:var(--dark);transition:all .2s;display:flex;align-items:center;gap:4px;}
.tbtn:hover{border-color:var(--purple);color:var(--purple);}
.tbtn.exp{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:none;box-shadow:0 4px 11px rgba(124,92,252,.22);}
.tbtn.exp:hover{transform:translateY(-1px);}
.zoom-c{display:flex;align-items:center;gap:5px;}
.zoom-c button{width:25px;height:25px;border:2px solid var(--light);background:var(--white);border-radius:7px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;}
.zoom-c span{font-size:.74rem;min-width:33px;text-align:center;font-weight:700;color:var(--gray);}
.preview-scroll{flex:1;overflow:auto;padding:24px;display:flex;justify-content:center;align-items:flex-start;}

/* ── CV DOCUMENT ── */
#cvDoc{background:#fff;width:794px;min-height:1123px;box-shadow:0 20px 60px rgba(0,0,0,.15);font-family:'Arial',sans-serif;font-size:13px;direction:ltr;flex-shrink:0;transform-origin:top center;transition:transform .2s;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:600px;gap:14px;text-align:center;}
.empty-icon{font-size:4rem;}
.empty-state h3{font-size:1.1rem;font-weight:700;}
.empty-state p{color:var(--gray);font-size:.85rem;max-width:240px;line-height:1.6;}

/* ── MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(26,26,46,.55);backdrop-filter:blur(5px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-bg.open{display:flex;}
.modal{background:var(--white);border-radius:20px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.2);animation:sIn .3s ease;}
.modal-head{padding:18px 20px 14px;border-bottom:2px solid var(--light);display:flex;align-items:center;justify-content:space-between;}
.modal-head h3{font-size:.98rem;font-weight:800;}
.modal-head h3 span{background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
.close-btn{background:var(--light);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:13px;}
.modal-foot{padding:12px 20px;border-top:2px solid var(--light);display:flex;gap:9px;justify-content:flex-end;}
.modal-foot .btn-main,.modal-foot .btn-sec{width:auto;padding:10px 20px;}

/* ── UPGRADE MODAL ── */
.plan-box{background:var(--light);border-radius:13px;padding:15px;display:flex;flex-direction:column;gap:7px;}
.plan-title{font-size:.81rem;font-weight:700;}
.plan-desc{font-size:.75rem;color:var(--gray);line-height:1.7;}
.plan-divider{height:1px;background:#ddd;margin:3px 0;}
.plan-title.premium{color:var(--purple);}
.btn-upgrade{background:linear-gradient(135deg,#f7971e,#ffd200);border:none;color:#333;padding:12px 24px;border-radius:50px;font-family:inherit;font-size:.91rem;font-weight:800;cursor:pointer;width:100%;transition:all .2s;box-shadow:0 4px 14px rgba(247,151,30,.3);}
.btn-upgrade:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(247,151,30,.4);}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:10px 20px;border-radius:50px;font-size:.83rem;font-weight:600;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── LOADING SPINNER ── */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── CV TEMPLATES ── */
.tpl-modern .cv-head{padding:30px 32px 22px;}
.tpl-modern .cv-name{font-size:23px;font-weight:700;color:#fff;letter-spacing:-.3px;}
.tpl-modern .cv-jobtitle{font-size:11.5px;color:rgba(255,255,255,.82);margin-top:3px;margin-bottom:11px;}
.tpl-modern .cv-contact{display:flex;flex-wrap:wrap;gap:10px;}
.tpl-modern .cv-contact span{font-size:10px;color:rgba(255,255,255,.85);}
.tpl-modern .cv-body{display:grid;grid-template-columns:200px 1fr;}
.tpl-modern .cv-sidebar{background:#f7f8ff;padding:20px 17px;border-right:2px solid #eee;}
.tpl-modern .cv-main{padding:20px;}
.tpl-modern .sec-t{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;padding-bottom:4px;margin-bottom:10px;border-bottom:2px solid currentColor;}
.tpl-modern .exp-item{margin-bottom:14px;}
.tpl-modern .exp-role{font-size:11px;font-weight:700;color:#2d3561;}
.tpl-modern .exp-co{font-size:10px;font-weight:600;margin-bottom:1px;}
.tpl-modern .exp-date{font-size:9px;color:#999;margin-bottom:4px;}
.tpl-modern .exp-desc{font-size:10px;color:#444;line-height:1.65;}
.tpl-modern .skill-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.tpl-modern .skill-name{font-size:9.5px;color:#333;}
.tpl-modern .skill-bar{width:70px;height:4px;background:#e0e0e0;border-radius:2px;overflow:hidden;}
.tpl-modern .skill-fill{height:100%;border-radius:2px;}
.tpl-modern .lang-row{display:flex;justify-content:space-between;margin-bottom:4px;font-size:9.5px;}
.tpl-modern .summary-p{font-size:10px;color:#333;line-height:1.7;margin-bottom:13px;}
.tpl-modern .edu-item{margin-bottom:10px;}
.tpl-modern .edu-deg{font-size:10px;font-weight:700;color:#2d3561;}
.tpl-modern .edu-inst{font-size:9.5px;font-weight:600;}
.tpl-modern .edu-date{font-size:9px;color:#999;}
.tpl-modern .s-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.tpl-modern .s-chip{font-size:8px;font-weight:700;padding:2px 7px;border-radius:4px;}

.tpl-classic .cv-head{padding:26px 32px 20px;border-bottom:3px solid;}
.tpl-classic .cv-name{font-size:22px;font-weight:700;}
.tpl-classic .cv-jobtitle{font-size:11px;color:#666;margin-top:3px;margin-bottom:9px;}
.tpl-classic .cv-contact{display:flex;flex-wrap:wrap;gap:10px;}
.tpl-classic .cv-contact span{font-size:10px;color:#555;}
.tpl-classic .cv-body{padding:20px 32px;}
.tpl-classic .sec-t{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-top:15px;margin-bottom:7px;border-bottom:1px solid #eee;padding-bottom:4px;}
.tpl-classic .exp-item{margin-bottom:12px;}
.tpl-classic .exp-hd{display:flex;justify-content:space-between;}
.tpl-classic .exp-role{font-size:11px;font-weight:700;}
.tpl-classic .exp-date{font-size:9px;color:#888;}
.tpl-classic .exp-co{font-size:10px;margin-bottom:4px;}
.tpl-classic .exp-desc{font-size:10px;color:#444;line-height:1.65;}
.tpl-classic .s-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.tpl-classic .s-chip{font-size:9px;font-weight:600;padding:2px 8px;border-radius:4px;}
.tpl-classic .summary-p{font-size:10px;color:#333;line-height:1.7;margin-bottom:4px;}
.tpl-classic .edu-item{margin-bottom:9px;}
.tpl-classic .edu-deg{font-size:10.5px;font-weight:700;}
.tpl-classic .edu-inst{font-size:9.5px;color:#666;}
.tpl-classic .edu-date{font-size:9px;color:#999;}

@media(max-width:820px){.app{grid-template-columns:1fr;}.preview-panel{display:none;}.nav-steps{display:none;}}
</style>
</head>
<body class="en">

<!-- TOP NAV -->
<nav class="topnav">
  <div class="logo">⚡ CVPro AI</div>
  <div class="nav-steps">
    <button class="nav-step active" onclick="goStep(1)" id="ns1"><span class="num">1</span> <span data-t="step1"></span></button>
    <button class="nav-step" onclick="goStep(2)" id="ns2"><span class="num">2</span> <span data-t="step2"></span></button>
    <button class="nav-step" onclick="goStep(3)" id="ns3"><span class="num">3</span> <span data-t="step3"></span></button>
    <button class="nav-step" onclick="goStep(4)" id="ns4"><span class="num">4</span> <span data-t="step4"></span></button>
  </div>
  <div class="nav-right">
    <button class="free-badge" id="usageBadge" onclick="openModal('upgradeModal')">5 AI left</button>
    <div class="lang-switcher">
      <button class="lbtn active" onclick="setLang('en')">🇬🇧 EN</button>
      <button class="lbtn" onclick="setLang('ar')">🇸🇦 AR</button>
      <button class="lbtn" onclick="setLang('fr')">🇫🇷 FR</button>
    </div>
  </div>
</nav>

<div class="app">
  <!-- FORM PANEL -->
  <div class="form-panel">

    <!-- STEP 1 -->
    <div class="step-card active" id="step1">
      <div><div class="step-title" data-t="s1title"></div><div class="step-sub" data-t="s1sub"></div></div>
      <div class="std-grid">
        <div class="std-card" onclick="selectStd(this,'europass')"><div class="flag">🇪🇺</div><strong>Europass</strong><small data-t="eu_desc"></small><div class="chk">✓</div></div>
        <div class="std-card" onclick="selectStd(this,'canadian')"><div class="flag">🇨🇦</div><strong>Canadian</strong><small data-t="ca_desc"></small><div class="chk">✓</div></div>
        <div class="std-card" onclick="selectStd(this,'british')"><div class="flag">🇬🇧</div><strong>British CV</strong><small data-t="uk_desc"></small><div class="chk">✓</div></div>
        <div class="std-card" onclick="selectStd(this,'american')"><div class="flag">🇺🇸</div><strong>American</strong><small data-t="us_desc"></small><div class="chk">✓</div></div>
      </div>
      <div class="field"><label data-t="cv_lang_label"></label>
        <div class="pills">
          <div class="pill selected" onclick="selectCVLang(this,'english')">🇬🇧 English</div>
          <div class="pill" onclick="selectCVLang(this,'french')">🇫🇷 Français</div>
          <div class="pill" onclick="selectCVLang(this,'arabic')">🇸🇦 العربية</div>
        </div>
      </div>
      <div class="field"><label data-t="color_label"></label>
        <div class="swatches">
          <div class="swatch active" style="background:#2d3561" onclick="setColor(this,'#2d3561')"></div>
          <div class="swatch" style="background:#7c5cfc" onclick="setColor(this,'#7c5cfc')"></div>
          <div class="swatch" style="background:#1a6b3c" onclick="setColor(this,'#1a6b3c')"></div>
          <div class="swatch" style="background:#b5451b" onclick="setColor(this,'#b5451b')"></div>
          <div class="swatch" style="background:#1a4a7a" onclick="setColor(this,'#1a4a7a')"></div>
          <div class="swatch" style="background:#1a1a2e" onclick="setColor(this,'#1a1a2e')"></div>
        </div>
      </div>
      <div class="field"><label data-t="tpl_label"></label>
        <div class="pills">
          <div class="pill selected" onclick="selectTpl(this,'modern')" data-t="tpl_modern"></div>
          <div class="pill" onclick="selectTpl(this,'classic')" data-t="tpl_classic"></div>
        </div>
      </div>
      <button class="btn-main" id="step1Next" onclick="goStep(2)" disabled data-t="next_personal"></button>
    </div>

// ════════════════════════
//  STATE
// ════════════════════════
const FREE_LIMIT = 5;
const S={
  uiLang:'en', cvLang:'english',
  std:'', color:'#2d3561', tpl:'modern',
  experiences:[], education:[], skills:[], languages:[],
  zoom:0.75
};

// ════════════════════════
//  FREEMIUM
// ════════════════════════
function getUsage(){ return parseInt(localStorage.getItem('cvpro_usage')||'0'); }
function addUsage(){ localStorage.setItem('cvpro_usage', getUsage()+1); }
function getRemaining(){ return Math.max(0, FREE_LIMIT - getUsage()); }
function hasPremium(){ return !!localStorage.getItem('cvpro_prem'); }

function updateBadge(){
  const b = document.getElementById('usageBadge');
  if(!b) return;
  if(hasPremium()){
    b.textContent = T[S.uiLang].badge_premium;
    b.className = 'free-badge premium';
  } else {
    const rem = getRemaining();
    b.textContent = rem + T[S.uiLang].badge_free;
    b.className = rem > 2 ? 'free-badge' : 'free-badge low';
  }
}

function activatePremium(){
  const k = document.getElementById('premiumKeyIn').value.trim();
  if(!k){ toast('⚠ ' + (S.uiLang==='ar'?'أدخل المفتاح':'Enter your API key')); return; }
  localStorage.setItem('cvpro_prem', k);
  closeModal('upgradeModal');
  updateBadge();
  toast('⭐ ' + (S.uiLang==='ar'?'تم التفعيل!':'Unlimited activated!'));
}

function showUpgradeModal(){
  const msg = document.getElementById('upgradeMsg');
  if(msg) msg.textContent = T[S.uiLang].limit_msg;
  openModal('upgradeModal');
}

// ════════════════════════
//  AI ENGINE
// ════════════════════════
async function callAI(prompt, maxT=600){
  // Check limit
  if(!hasPremium() && getUsage() >= FREE_LIMIT){
    showUpgradeModal();
    throw new Error('limit');
  }

  // Call our secure backend (hides the key)
  const r = await fetch('/api/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      prompt,
      maxTokens: maxT,
      // If user has premium key, send it so backend uses it instead
      userKey: hasPremium() ? localStorage.getItem('cvpro_prem') : null
    })
  });

  const d = await r.json();
  if(!r.ok) throw new Error(d.error || 'AI error');

  // Count usage only for free users
  if(!hasPremium()){ addUsage(); updateBadge(); }

  return d.result;
}

// ════════════════════════
//  LANGUAGE
// ════════════════════════
function setLang(lang){
  S.uiLang = lang;
  document.querySelectorAll('.lbtn').forEach(b=>b.classList.remove('active'));
  event?.target?.classList.add('active');
  // fix active button when called programmatically
  document.querySelectorAll('.lbtn').forEach(b=>{
    if(b.textContent.toLowerCase().includes(lang)) b.classList.add('active');
  });
  const isRTL = lang==='ar';
  document.documentElement.lang = lang;
  document.documentElement.dir = isRTL?'rtl':'ltr';
  document.body.className = lang;
  document.querySelectorAll('[data-t]').forEach(el=>{
    const k=el.getAttribute('data-t'), txt=T[lang][k];
    if(txt!==undefined) el.textContent=txt;
  });
  document.querySelectorAll('[data-t-placeholder]').forEach(el=>{
    const k=el.getAttribute('data-t-placeholder'), txt=T[lang][k];
    if(txt!==undefined) el.placeholder=txt;
  });
  updateBadge();
  updatePreview();
}
function t(k){ return T[S.uiLang][k]||T.en[k]||k; }

// ════════════════════════
//  NAVIGATION
// ════════════════════════
function goStep(n){
  for(let i=1;i<=4;i++){
    document.getElementById('step'+i).classList.toggle('active',i===n);
    const ns=document.getElementById('ns'+i);
    ns.classList.remove('active','done');
    if(i===n) ns.classList.add('active');
    else if(i<n) ns.classList.add('done');
  }
  if(n===4) updatePreview();
  window.scrollTo(0,0);
}

// ════════════════════════
//  STEP 1
// ════════════════════════
function selectStd(el,val){
  document.querySelectorAll('.std-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected'); S.std=val;
  document.getElementById('step1Next').disabled=false;
  updatePreview();
}
function selectCVLang(el,val){
  el.closest('.pills').querySelectorAll('.pill').forEach(p=>p.classList.remove('selected'));
  el.classList.add('selected'); S.cvLang=val;
}
function setColor(el,val){
  document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
  el.classList.add('active'); S.color=val; updatePreview();
}
function selectTpl(el,val){
  el.closest('.pills').querySelectorAll('.pill').forEach(p=>p.classList.remove('selected'));
  el.classList.add('selected'); S.tpl=val; updatePreview();
}

// ════════════════════════
//  PREVIEW
// ════════════════════════
function updatePreview(){
  const p=getData(), doc=document.getElementById('cvDoc');
  const hasData=p.fName||p.lName||p.jobTitle;
  if(!hasData){
    doc.className='';doc.style.cssText='';
    doc.innerHTML=`<div class="empty-state"><div class="empty-icon">📄</div><h3>${t('empty_title')}</h3><p>${t('empty_sub')}</p></div>`;
    return;
  }
  doc.className=S.tpl==='classic'?'tpl-classic':'tpl-modern';
  doc.style.transform=`scale(${S.zoom})`;
  doc.style.transformOrigin='top center';
  doc.innerHTML=S.tpl==='classic'?buildClassic(p):buildModern(p);
}
function getData(){
  return{fName:v('fName'),lName:v('lName'),jobTitle:v('jobTitle'),email:v('email'),phone:v('phone'),loc:v('loc'),linkedin:v('linkedin'),summary:document.getElementById('summaryResult')?.innerText?.trim()||''};
}
function v(id){return(document.getElementById(id)||{}).value||'';}

function buildModern(p){
  const c=S.color, name=`${p.fName} ${p.lName}`.trim()||'—';
  return`<div class="cv-head" style="background:linear-gradient(135deg,${c},${lighten(c)})">
    <div class="cv-name">${name}</div><div class="cv-jobtitle">${p.jobTitle||''}</div>
    <div class="cv-contact">${p.email?`<span>✉ ${p.email}</span>`:''} ${p.phone?`<span>📞 ${p.phone}</span>`:''} ${p.loc?`<span>📍 ${p.loc}</span>`:''} ${p.linkedin?`<span>🔗 ${p.linkedin}</span>`:''}</div>
  </div>
  <div class="cv-body">
    <div class="cv-sidebar">
      ${S.skills.length?`<div class="sec-t" style="color:${c}">SKILLS</div>${S.skills.map(s=>`<div class="skill-row"><span class="skill-name">${s.name}</span><div class="skill-bar"><div class="skill-fill" style="width:${lvl(s.level)}%;background:${c}"></div></div></div>`).join('')}`:''}
      ${S.languages.length?`<div class="sec-t" style="color:${c};margin-top:12px">LANGUAGES</div>${S.languages.map(l=>`<div class="lang-row"><span>${l.lang}</span><span style="color:${c};font-weight:700">${l.level}</span></div>`).join('')}`:''}
      ${S.education.length?`<div class="sec-t" style="color:${c};margin-top:12px">EDUCATION</div>${S.education.map(e=>`<div class="edu-item"><div class="edu-deg">${e.deg}</div><div class="edu-inst" style="color:${c}">${e.inst}</div><div class="edu-date">${e.from||''}${e.to?' – '+e.to:''}</div>${e.grade?`<div style="font-size:9px;color:#666">${e.grade}</div>`:''}</div>`).join('')}`:''}
    </div>
    <div class="cv-main">
      ${p.summary?`<div class="sec-t" style="color:${c}">SUMMARY</div><div class="summary-p">${p.summary}</div>`:''}
      ${S.experiences.length?`<div class="sec-t" style="color:${c}">WORK EXPERIENCE</div>${S.experiences.map(e=>`<div class="exp-item"><div class="exp-role">${e.title}</div><div class="exp-co" style="color:${c}">${e.company}</div><div class="exp-date">${fmtDate(e.from)} – ${fmtDate(e.to)}</div><div class="exp-desc">${(e.desc||'').replace(/\n/g,'<br>')}</div></div>`).join('')}`:''}
    </div>
  </div>`;
}
function buildClassic(p){
  const c=S.color, name=`${p.fName} ${p.lName}`.trim()||'—';
  return`<div class="cv-head" style="border-color:${c}">
    <div class="cv-name" style="color:${c}">${name}</div><div class="cv-jobtitle">${p.jobTitle||''}</div>
    <div class="cv-contact">${p.email?`<span>✉ ${p.email}</span>`:''} ${p.phone?`<span>| 📞 ${p.phone}</span>`:''} ${p.loc?`<span>| 📍 ${p.loc}</span>`:''}</div>
  </div>
  <div class="cv-body">
    ${p.summary?`<div class="sec-t" style="color:${c}">PROFESSIONAL SUMMARY</div><div class="summary-p">${p.summary}</div>`:''}
    ${S.experiences.length?`<div class="sec-t" style="color:${c}">WORK EXPERIENCE</div>${S.experiences.map(e=>`<div class="exp-item"><div class="exp-hd"><span class="exp-role">${e.title}</span><span class="exp-date">${fmtDate(e.from)} – ${fmtDate(e.to)}</span></div><div class="exp-co" style="color:${c}">${e.company}</div><div class="exp-desc">${(e.desc||'').replace(/\n/g,'<br>')}</div></div>`).join('')}`:''}
    ${S.education.length?`<div class="sec-t" style="color:${c}">EDUCATION</div>${S.education.map(e=>`<div class="edu-item"><div class="exp-hd"><span class="edu-deg">${e.deg}</span><span class="exp-date">${e.from||''}${e.to?' – '+e.to:''}</span></div><div class="edu-inst" style="color:${c}">${e.inst}</div></div>`).join('')}`:''}
    ${S.skills.length?`<div class="sec-t" style="color:${c}">SKILLS</div><div class="s-chips">${S.skills.map(s=>`<span class="s-chip" style="background:${c}18;color:${c}">${s.name}</span>`).join('')}</div>`:''}
  </div>`;
}
function lighten(h){try{let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return `rgb(${Math.min(255,r+60)},${Math.min(255,g+40)},${Math.min(255,b+80)})`;}catch{return h;}}
function lvl(l){return{Expert:100,Advanced:80,Intermediate:60,Basic:40}[l]||60;}
function fmtDate(v){if(!v)return'';if(v==='Present')return'Present';if(v.includes('-')){const[y,m]=v.split('-');return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+' '+y;}return v;}
function zoom(d){S.zoom=Math.max(.4,Math.min(1.4,S.zoom+d));document.getElementById('zoomLbl').textContent=Math.round(S.zoom*100)+'%';updatePreview();}

// ════════════════════════
//  MODALS
// ════════════════════════
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

// ════════════════════════
//  EXPERIENCE
// ════════════════════════
function saveExp(){
  const title=v('eTitle'),company=v('eCompany');
  if(!title||!company){toast('⚠ '+t('exp_role')+' & '+t('exp_company'));return;}
  const desc=document.getElementById('eEnhanced').innerText||v('eDesc');
  const to=document.getElementById('eCurrent').checked?'Present':v('eTo');
  S.experiences.push({id:Date.now(),title,company,from:v('eFrom'),to,desc});
  renderExp();closeModal('expModal');clearExpForm();updatePreview();toast('✓ Added');
}
function renderExp(){document.getElementById('expList').innerHTML=S.experiences.map(e=>`<div class="item-pill"><div><strong>${e.title}</strong><small>${e.company} · ${fmtDate(e.from)}–${fmtDate(e.to)}</small></div><button class="del-btn" onclick="delExp(${e.id})">🗑</button></div>`).join('');}
function delExp(id){S.experiences=S.experiences.filter(e=>e.id!==id);renderExp();updatePreview();}
function clearExpForm(){['eTitle','eCompany','eFrom','eTo','eDesc'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});document.getElementById('eCurrent').checked=false;const ee=document.getElementById('eEnhanced');ee.style.display='none';ee.textContent='';}

// ════════════════════════
//  EDUCATION
// ════════════════════════
function saveEdu(){
  const deg=v('edDeg'),inst=v('edInst');
  if(!deg||!inst){toast('⚠ Required');return;}
  S.education.push({id:Date.now(),deg,inst,from:v('edFrom'),to:v('edTo'),grade:v('edGrade')});
  renderEdu();closeModal('eduModal');updatePreview();toast('✓ Added');
}
function renderEdu(){document.getElementById('eduList').innerHTML=S.education.map(e=>`<div class="item-pill"><div><strong>${e.deg}</strong><small>${e.inst} · ${e.from||''}–${e.to||''}</small></div><button class="del-btn" onclick="delEdu(${e.id})">🗑</button></div>`).join('');}
function delEdu(id){S.education=S.education.filter(e=>e.id!==id);renderEdu();updatePreview();}

// ════════════════════════
//  SKILLS & LANGUAGES
// ════════════════════════
function addSkillPrompt(){const name=prompt(t('skills_section')+':');if(!name)return;const lm={'1':'Expert','2':'Advanced','3':'Intermediate','4':'Basic'};const ln=prompt('1.Expert 2.Advanced 3.Intermediate 4.Basic','2');S.skills.push({id:Date.now(),name,level:lm[ln]||'Advanced'});renderSkills();updatePreview();}
function renderSkills(){document.getElementById('skillList').innerHTML=S.skills.map(s=>`<div class="skill-tag">${s.name} <span style="opacity:.6;font-size:.68em">${s.level}</span><button onclick="delSkill(${s.id})">×</button></div>`).join('');}
function delSkill(id){S.skills=S.skills.filter(s=>s.id!==id);renderSkills();updatePreview();}
function addLangPrompt(){const lang=prompt(t('lang_section')+':');if(!lang)return;const level=prompt('A1/A2/B1/B2/C1/C2/Native:','B2');if(!level)return;S.languages.push({id:Date.now(),lang,level});renderLangs();updatePreview();}
function renderLangs(){document.getElementById('langList').innerHTML=S.languages.map(l=>`<div class="item-pill"><div><strong>${l.lang}</strong><small>CEFR: ${l.level}</small></div><button class="del-btn" onclick="delLang(${l.id})">🗑</button></div>`).join('');}
function delLang(id){S.languages=S.languages.filter(l=>l.id!==id);renderLangs();updatePreview();}

// ════════════════════════
//  AI FUNCTIONS
// ════════════════════════
function setLoading(btn,loading){
  if(loading){btn.dataset.orig=btn.innerHTML;btn.innerHTML='<span class="spinner"></span>';btn.disabled=true;}
  else{btn.innerHTML=btn.dataset.orig||btn.innerHTML;btn.disabled=false;}
}

async function generateSummary(){
  const input=document.getElementById('aiInput').value.trim();
  if(!input){toast('⚠ '+t('ai_summary_ph').substring(0,30)+'...');return;}
  const btn=document.getElementById('genBtn');
  setLoading(btn,true);
  try{
    const langMap={english:'English',french:'French',arabic:'Arabic'};
    const res=await callAI(`You are a professional CV writer. Write a professional CV summary.\nPerson info: ${input}\nStandard: ${S.std}, Language: ${langMap[S.cvLang]||'English'}.\nReturn ONLY the summary, 3-4 sentences, ATS-friendly.`);
    const box=document.getElementById('summaryResult');
    box.style.display='block';box.textContent='';
    await typeText(box,res);updatePreview();toast('✓ Done!');
  }catch(e){if(e.message!=='limit')toast('⚠ '+e.message);}
  finally{setLoading(btn,false);}
}

async function enhanceExp(){
  const title=v('eTitle'),company=v('eCompany'),desc=v('eDesc');
  if(!desc){toast('⚠ '+t('exp_desc'));return;}
  const btn=document.querySelector('#expModal .btn-ai');
  setLoading(btn,true);
  try{
    const res=await callAI(`You are a professional CV writer. Rewrite this job experience as 3-5 bullet points starting with •, using strong action verbs.\nJob: ${title} at ${company}\nDescription: ${desc}`);
    const box=document.getElementById('eEnhanced');
    box.style.display='block';box.textContent='';
    await typeText(box,res);toast('✓ Done!');
  }catch(e){if(e.message!=='limit')toast('⚠ '+e.message);}
  finally{setLoading(btn,false);}
}

async function suggestSkills(){
  const job=v('jobTitle')||'professional';
  const btn=document.getElementById('suggestBtn');
  setLoading(btn,true);
  try{
    const res=await callAI(`Suggest 8 skills for a ${job} CV (${S.std} standard). Return ONLY a JSON array: [{"name":"Skill","level":"Expert|Advanced|Intermediate|Basic"}]. No explanation.`);
    const skills=JSON.parse(res.replace(/```json|```/g,'').trim());
    document.getElementById('suggestedSkills').innerHTML=skills.map(s=>`<div class="skill-tag" style="cursor:pointer;border-color:rgba(78,205,196,.4)" onclick="addSug('${s.name}','${s.level}',this)">+ ${s.name} <small style="opacity:.6">${s.level}</small></div>`).join('');
    toast(`✓ ${skills.length} skills`);
  }catch(e){if(e.message!=='limit')toast('⚠ '+e.message);}
  finally{setLoading(btn,false);}
}
function addSug(name,level,el){S.skills.push({id:Date.now(),name,level});renderSkills();updatePreview();el.style.opacity='.4';el.style.pointerEvents='none';}

async function calcATS(){
  const p=getData();
  const btn=document.querySelector('#atsResult').previousElementSibling?.querySelector('.add-btn');
  try{
    const res=await callAI(`Analyze this CV for ATS compatibility. Return ONLY JSON: {"score":number,"tips":["tip1","tip2","tip3"]}\nTitle:${p.jobTitle}, Summary:${p.summary?'yes':'no'}, Exp:${S.experiences.length}, Skills:${S.skills.length}, Edu:${S.education.length}, Standard:${S.std}`);
    const d=JSON.parse(res.replace(/```json|```/g,'').trim());
    const col=d.score>70?'var(--green)':d.score>50?'var(--orange)':'#ff6b6b';
    document.getElementById('atsResult').innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;"><div style="font-size:2rem;font-weight:900;color:${col}">${d.score}</div><div style="font-size:.75rem;color:var(--gray)">/100</div></div><ul style="padding-inline-start:16px;font-size:.78rem;color:var(--gray);line-height:2;">${(d.tips||[]).map(tp=>`<li>${tp}</li>`).join('')}</ul>`;
  }catch(e){if(e.message!=='limit')toast('⚠ '+e.message);}
}

async function improveSection(){
  const input=document.getElementById('improveInput').value.trim();
  if(!input){toast('⚠ '+t('improve_ph').substring(0,20));return;}
  try{
    const res=await callAI(`You are a CV consultant. Provide improved text for this CV improvement request: ${input}\nContext: Title: ${v('jobTitle')}, Exp entries: ${S.experiences.length}`);
    const box=document.getElementById('improveResult');
    box.style.display='block';box.textContent='';
    await typeText(box,res);toast('✓ Done!');
  }catch(e){if(e.message!=='limit')toast('⚠ '+e.message);}
}

// ════════════════════════
//  EXPORT
// ════════════════════════
function exportPDF(){
  updatePreview();
  const el=document.getElementById('cvDoc');
  const p=getData();
  const orig=el.style.transform;
  el.style.transform='scale(1)';
  html2pdf().set({margin:0,filename:`${p.fName||'CV'}_${p.lName||''}.pdf`,image:{type:'jpeg',quality:.98},html2canvas:{scale:2},jsPDF:{unit:'px',format:[794,1123]}}).from(el).save().then(()=>{el.style.transform=orig;toast('✓ PDF exported!');});
}
function copyText(){navigator.clipboard.writeText(document.getElementById('cvDoc').innerText).then(()=>toast('✓ Copied!'));}

// ════════════════════════
//  HELPERS
// ════════════════════════
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
async function typeText(el,text){el.textContent='';for(let i=0;i<text.length;i++){el.textContent+=text[i];if(i%6===0)await new Promise(r=>setTimeout(r,7));}}

// ════════════════════════
//  INIT
// ════════════════════════
setLang('en');
updateBadge();
</script>
</body>
</html>
