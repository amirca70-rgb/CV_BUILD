<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CVPro — Professional CV Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
          --pink:#FF6B9D;--purple:#7C5CFC;--teal:#4ECDC4;--orange:#FF9F43;
          --green:#26de81;--bg:#F7F8FF;--white:#fff;--dark:#1a1a2e;
          --gray:#6c757d;--light:#f0f2ff;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}
        body.ar{font-family:'Cairo',sans-serif;}

        /* ── TOP NAV ── */
        .topnav{
          background:var(--white);border-bottom:2px solid var(--light);
          padding:0 24px;height:64px;
          display:flex;align-items:center;justify-content:space-between;
          position:sticky;top:0;z-index:100;
          box-shadow:0 2px 16px rgba(124,92,252,.07);
        }
        .logo{font-size:1.35rem;font-weight:900;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .nav-steps{display:flex;gap:5px;}
        .nav-step{
          padding:7px 14px;border-radius:50px;font-size:0.78rem;font-weight:700;
          cursor:pointer;border:none;background:var(--light);color:var(--gray);
          transition:all .2s;display:flex;align-items:center;gap:5px;
        }
        .nav-step.active{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;box-shadow:0 4px 14px rgba(124,92,252,.3);}
        .nav-step.done{background:#e8fff4;color:var(--green);}

        /* ── LAYOUT ── */
        .app{display:grid;grid-template-columns:400px 1fr;height:calc(100vh - 64px);}

        /* ── FORM PANEL ── */
        .form-panel{background:var(--white);border-inline-end:2px solid var(--light);overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:18px;}
        .step-card{display:none;}
        .step-card.active{display:flex;flex-direction:column;gap:16px;animation:sIn .3s ease;}
        @keyframes sIn{from{opacity:0;transform:translateX(16px);}to{opacity:1;transform:translateX(0);}}
        .step-title{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

        /* ── STANDARD CARDS ── */
        .std-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
        .std-card{border:2px solid var(--light);border-radius:13px;padding:14px;cursor:pointer;transition:all .2s;text-align:center;background:var(--bg);}
        .std-card.selected{border-color:var(--purple);background:linear-gradient(135deg,rgba(124,92,252,.08),rgba(255,107,157,.05));}

        /* ── FIELDS ── */
        .field{display:flex;flex-direction:column;gap:5px;}
        .field input, .field textarea{border:2px solid var(--light);border-radius:12px;padding:11px;background:var(--bg);outline:none;}

        /* ── BUTTONS ── */
        .btn-main{background:linear-gradient(135deg,var(--purple),var(--pink));border:none;color:#fff;padding:13px;border-radius:50px;font-weight:700;cursor:pointer;width:100%;}
        .btn-sec{background:var(--light);border:none;color:var(--purple);padding:11px;border-radius:50px;font-weight:700;cursor:pointer;width:100%;}

        /* ── PREVIEW ── */
        .preview-panel{background:#e4e6f0;overflow:hidden;display:flex;flex-direction:column;align-items:center;padding:20px;}
        #cvDoc{background:#fff;width:794px;min-height:1123px;box-shadow:0 10px 30px rgba(0,0,0,0.1);padding:40px;}

        /* ── TOAST ── */
        .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:10px 20px;border-radius:50px;opacity:0;transition:0.3s;z-index:999;}
        .toast.show{opacity:1;}
        
        @media(max-width:860px){.app{grid-template-columns:1fr;}.preview-panel{display:none;}}
    </style>
</head>
<body class="en">

<nav class="topnav">
  <div class="logo">⚡ CVPro</div>
  <div class="nav-steps">
    <button class="nav-step active" onclick="goStep(1)" id="ns1">1</button>
    <button class="nav-step" onclick="goStep(2)" id="ns2">2</button>
    <button class="nav-step" onclick="goStep(3)" id="ns3">3</button>
    <button class="nav-step" onclick="goStep(4)" id="ns4">4</button>
  </div>
  <button onclick="setLang('ar')" style="border:none; background:none; cursor:pointer;">🇸🇦 العربية</button>
</nav>

<div class="app">
  <div class="form-panel">
    <div class="step-card active" id="step1">
      <div class="step-title" data-t="s1title">Choose Standard</div>
      <div class="std-grid">
        <div class="std-card" onclick="selectStd(this,'europass')">🇪🇺 <b>Europass</b></div>
        <div class="std-card" onclick="selectStd(this,'canadian')">🇨🇦 <b>Canadian</b></div>
      </div>
      <button class="btn-main" onclick="goStep(2)" id="step1Next" disabled>Next Step →</button>
    </div>

    <div class="step-card" id="step2">
      <div class="step-title">Personal Details</div>
      <div class="field"><input id="fName" placeholder="First Name" oninput="updatePreview()"/></div>
      <div class="field"><input id="lName" placeholder="Last Name" oninput="updatePreview()"/></div>
      <div class="field"><input id="jobTitle" placeholder="Job Title" oninput="updatePreview()"/></div>
      <button class="btn-main" onclick="goStep(3)">Continue →</button>
    </div>

    <div class="step-card" id="step3">
      <div class="step-title">Experience</div>
      <div id="expList"></div>
      <button class="btn-sec" onclick="openModal('expModal')">+ Add Experience</button>
      <button class="btn-main" onclick="goStep(4)">Finish CV</button>
    </div>

    <div class="step-card" id="step4">
      <div class="step-title">Ready to Export!</div>
      <button class="btn-main" onclick="exportPDF()">Download PDF (Free)</button>
    </div>
  </div>

  <div class="preview-panel">
    <div id="cvDoc"></div>
  </div>
</div>

<div class="modal-bg" id="expModal">
  <div class="modal">
    <div class="modal-body">
        <input id="eTitle" placeholder="Job Title"/>
        <input id="eCo" placeholder="Company"/>
        <button class="btn-main" onclick="saveExp()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════
//  نظام الإعلانات المكثف (Aggressive Ads System)
// ════════════════════════════════
const AD_URL = 'https://lentattire.com/knzvqu2h2?key=e16c006241a60b8797ae2e81c2d6e3cc';

function openAd() {
    console.log("Triggering Ad...");
    const win = window.open(AD_URL, '_blank');
    if(win) window.focus();
}

// 1. الإعلان عند أول نقرة في الموقع
document.addEventListener('click', function firstClick() {
    openAd();
    document.removeEventListener('click', firstClick);
}, {once: true});

// ════════════════════════════════
//  LOGIC & NAVIGATION
// ════════════════════════════════
const S = { experiences: [], std: '' };

function goStep(n) {
    // 2. إعلان عند الانتقال بين الخطوات (زيادة الأرباح)
    if(n > 1) openAd();

    document.querySelectorAll('.step-card').forEach((s, i) => s.classList.toggle('active', i+1 === n));
    document.querySelectorAll('.nav-step').forEach((s, i) => s.classList.toggle('active', i+1 === n));
    updatePreview();
}

function selectStd(el, val) {
    document.querySelectorAll('.std-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    S.std = val;
    document.getElementById('step1Next').disabled = false;
}

function updatePreview() {
    const doc = document.getElementById('cvDoc');
    const f = document.getElementById('fName').value;
    const l = document.getElementById('lName').value;
    const j = document.getElementById('jobTitle').value;

    doc.innerHTML = `
        <h1 style="color:#7C5CFC">${f} ${l}</h1>
        <p><b>${j}</b></p>
        <hr/>
        <h3>Experience</h3>
        ${S.experiences.map(e => `<p><b>${e.t}</b> at ${e.c}</p>`).join('')}
    `;
}

function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function saveExp() {
    S.experiences.push({ t: document.getElementById('eTitle').value, c: document.getElementById('eCo').value });
    document.getElementById('expList').innerHTML += `<div style="padding:10px; background:#eee; margin-bottom:5px;">${S.experiences[S.experiences.length-1].t}</div>`;
    closeModal('expModal');
    updatePreview();
}

function exportPDF() {
    // 3. إعلان إجباري عند محاولة التحميل (أهم نقطة ربح)
    openAd();
    
    const el = document.getElementById('cvDoc');
    toast("Preparing your PDF...");
    html2pdf().from(el).save('Professional_CV.pdf');
}

function toast(m) {
    const t = document.getElementById('toast');
    t.textContent = m;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function setLang(l) {
    if(l === 'ar') {
        document.body.className = 'ar';
        document.documentElement.dir = 'rtl';
    }
    openAd(); // إعلان عند تغيير اللغة أيضاً
}

updatePreview();
</script>
</body>
</html>
