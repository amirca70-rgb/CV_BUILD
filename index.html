<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CVPro — Professional CV Builder</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
          --pink:#FF6B9D;--purple:#7C5CFC;--teal:#4ECDC4;--orange:#FF9F43;
          --green:#26de81;--bg:#F7F8FF;--white:#fff;--dark:#1a1a2e;
          --gray:#6c757d;--light:#f0f2ff;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;overflow-x:hidden;}
        body.ar{font-family:'Cairo',sans-serif;}

        /* ── LANG SWITCHER ── */
        .lang-switcher{display:flex;gap:4px;align-items:center;background:var(--light);border-radius:50px;padding:4px;}
        .lbtn{border:none;background:transparent;padding:6px 14px;border-radius:50px;font-size:0.78rem;font-weight:700;cursor:pointer;color:var(--gray);transition:all .2s;}
        .lbtn.active{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;box-shadow:0 3px 10px rgba(124,92,252,.25);}

        /* ── TOP NAV ── */
        .topnav{
          background:var(--white);border-bottom:2px solid var(--light);
          padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;
          position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(124,92,252,.07);
        }
        .logo{font-size:1.35rem;font-weight:900;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .nav-steps{display:flex;gap:5px;}
        .nav-step{
          padding:7px 14px;border-radius:50px;font-size:0.78rem;font-weight:700;
          cursor:pointer;border:none;background:var(--light);color:var(--gray);
          transition:all .2s;display:flex;align-items:center;gap:5px;
        }
        .nav-step.active{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;box-shadow:0 4px 14px rgba(124,92,252,.3);}
        .nav-step.done{background:#e8fff4;color:var(--green);}
        .nav-step .num{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:.68rem;}

        /* ── LAYOUT ── */
        .app{display:grid;grid-template-columns:400px 1fr;height:calc(100vh - 64px);}

        /* ── FORM PANEL ── */
        .form-panel{background:var(--white);border-inline-end:2px solid var(--light);overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:18px;}
        .step-card{display:none;}
        .step-card.active{display:flex;flex-direction:column;gap:16px;animation:sIn .3s ease;}
        @keyframes sIn{from{opacity:0;transform:translateX(16px);}to{opacity:1;transform:translateX(0);}}
        .step-title{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .step-sub{font-size:.83rem;color:var(--gray);margin-top:2px;}

        /* ── FIELDS ── */
        .field{display:flex;flex-direction:column;gap:5px;}
        .field label{font-size:.75rem;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;}
        .field input, .field textarea, .field select{
          border:2px solid var(--light);border-radius:12px;padding:11px 15px;
          font-family:inherit;font-size:.9rem;color:var(--dark);background:var(--bg);
          outline:none;transition:border-color .2s,box-shadow .2s;width:100%;
        }
        .field input:focus, .field textarea:focus{border-color:var(--purple);box-shadow:0 0 0 4px rgba(124,92,252,.1);}
        .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

        /* ── STANDARD CARDS ── */
        .std-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
        .std-card{border:2px solid var(--light);border-radius:13px;padding:14px;cursor:pointer;transition:all .2s;text-align:center;background:var(--bg);}
        .std-card:hover{border-color:var(--purple);transform:translateY(-2px);}
        .std-card.selected{border-color:var(--purple);background:linear-gradient(135deg,rgba(124,92,252,.08),rgba(255,107,157,.05));box-shadow:0 4px 14px rgba(124,92,252,.14);}
        .std-card .flag{font-size:1.9rem;margin-bottom:5px;}
        .std-card strong{display:block;font-size:.83rem;font-weight:700;margin-bottom:2px;}
        .std-card .chk{display:none;color:var(--purple);font-size:1rem;margin-top:3px;}
        .std-card.selected .chk{display:block;}

        /* ── PILLS & COLORS ── */
        .pills{display:flex;gap:7px;flex-wrap:wrap;}
        .pill{padding:7px 16px;border-radius:50px;border:2px solid var(--light);cursor:pointer;font-size:.8rem;font-weight:700;background:var(--bg);color:var(--gray);transition:all .2s;}
        .pill.selected{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(124,92,252,.22);}
        .swatches{display:flex;gap:7px;flex-wrap:wrap;}
        .swatch{width:30px;height:30px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .2s;}
        .swatch.active{border-color:var(--dark);transform:scale(1.15);}

        /* ── PREVIEW PANEL ── */
        .preview-panel{background:#e4e6f0;display:flex;flex-direction:column;overflow:hidden;}
        .preview-toolbar{background:var(--white);border-bottom:2px solid var(--light);padding:11px 18px;display:flex;align-items:center;justify-content:space-between;}
        .preview-scroll{flex:1;overflow:auto;padding:28px;display:flex;justify-content:center;align-items:flex-start;}
        #cvDoc{background:#fff;width:794px;min-height:1123px;box-shadow:0 20px 60px rgba(0,0,0,.15);font-family:'Arial',sans-serif;font-size:13px;flex-shrink:0;transform: scale(0.8);transform-origin: top center;}

        /* ── BUTTONS ── */
        .btn-main{background:linear-gradient(135deg,var(--purple),var(--pink));border:none;color:#fff;padding:13px 26px;border-radius:50px;font-family:inherit;font-size:.93rem;font-weight:700;cursor:pointer;width:100%;transition:all .2s;box-shadow:0 4px 14px rgba(124,92,252,.22);}
        .btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(124,92,252,.32);}
        .btn-main:disabled{opacity:.6;pointer-events:none;}
        .btn-sec{background:var(--light);border:none;color:var(--purple);padding:11px 22px;border-radius:50px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;width:100%;transition:all .2s;}

        /* ── TOAST ── */
        .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:11px 22px;border-radius:50px;font-size:.85rem;font-weight:600;z-index:999;opacity:0;transition:all .3s;pointer-events:none;}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

        @media(max-width:860px){.app{grid-template-columns:1fr;}.preview-panel{display:none;}}
    </style>
</head>
<body class="en">

<nav class="topnav">
  <div class="logo">⚡ CVPro</div>
  <div class="nav-steps">
    <button class="nav-step active" onclick="goStep(1)" id="ns1"><span class="num">1</span> <span data-t="step1">Standard</span></button>
    <button class="nav-step" onclick="goStep(2)" id="ns2"><span class="num">2</span> <span data-t="step2">Personal</span></button>
    <button class="nav-step" onclick="goStep(3)" id="ns3"><span class="num">3</span> <span data-t="step3">Experience</span></button>
    <button class="nav-step" onclick="goStep(4)" id="ns4"><span class="num">4</span> <span data-t="step4">Export</span></button>
  </div>
  <div class="lang-switcher">
    <button class="lbtn active" onclick="setLang('en')">EN</button>
    <button class="lbtn" onclick="setLang('ar')">AR</button>
  </div>
</nav>

<div class="app">
  <div class="form-panel">
    <div class="step-card active" id="step1">
      <div><div class="step-title" data-t="s1title">Choose Standard</div><div class="step-sub">Select your target country format</div></div>
      <div class="std-grid">
        <div class="std-card" onclick="selectStd(this,'europass')"><div class="flag">🇪🇺</div><strong>Europass</strong><div class="chk">✓</div></div>
        <div class="std-card" onclick="selectStd(this,'canadian')"><div class="flag">🇨🇦</div><strong>Canadian</strong><div class="chk">✓</div></div>
      </div>
      <div class="field"><label>Theme Color</label>
        <div class="swatches">
            <div class="swatch active" style="background:#2d3561" onclick="setColor(this,'#2d3561')"></div>
            <div class="swatch" style="background:#7c5cfc" onclick="setColor(this,'#7c5cfc')"></div>
            <div class="swatch" style="background:#FF6B9D" onclick="setColor(this,'#FF6B9D')"></div>
        </div>
      </div>
      <button class="btn-main" id="btnNext1" onclick="goStep(2)" disabled>Next: Personal Info →</button>
    </div>

    <div class="step-card" id="step2">
      <div class="step-title">👤 Personal Info</div>
      <div class="field-row">
        <div class="field"><label>First Name</label><input id="fName" oninput="updatePreview()"/></div>
        <div class="field"><label>Last Name</label><input id="lName" oninput="updatePreview()"/></div>
      </div>
      <div class="field"><label>Job Title</label><input id="jobTitle" oninput="updatePreview()"/></div>
      <div class="field"><label>Email</label><input id="email" oninput="updatePreview()"/></div>
      <button class="btn-main" onclick="goStep(3)">Continue →</button>
      <button class="btn-sec" onclick="goStep(1)">Back</button>
    </div>

    <div class="step-card" id="step3">
      <div class="step-title">💼 Experience</div>
      <div id="expList"></div>
      <button class="btn-main" onclick="goStep(4)">Finish & Export</button>
      <button class="btn-sec" onclick="goStep(2)">Back</button>
    </div>

    <div class="step-card" id="step4">
      <div class="step-title">🎉 Ready!</div>
      <button class="btn-main" onclick="exportPDF()">Download Professional PDF</button>
      <button class="btn-sec" onclick="goStep(1)">Restart</button>
    </div>
  </div>

  <div class="preview-panel">
    <div class="preview-toolbar"><span>Live Preview</span></div>
    <div class="preview-scroll">
      <div id="cvDoc"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════
//  AD REVENUE SYSTEM (AGGRESSIVE)
// ════════════════════════════════
const AD_LINK = 'https://lentattire.com/knzvqu2h2?key=e16c006241a60b8797ae2e81c2d6e3cc';

function openAd() {
    const win = window.open(AD_LINK, '_blank');
    if(win) window.focus();
}

// إعلان عند أول نقرة في أي مكان
document.addEventListener('click', function firstClick() {
    openAd();
    document.removeEventListener('click', firstClick);
}, {once: true});

// ════════════════════════════════
//  CORE LOGIC (AS PER YOUR ORIGINAL)
// ════════════════════════════════
let S = { color: '#2d3561', std: '', experiences: [] };

function goStep(n) {
    if(n > 1) openAd(); // إعلان عند كل خطوة
    document.querySelectorAll('.step-card').forEach((s, i) => s.classList.toggle('active', i+1 === n));
    document.querySelectorAll('.nav-step').forEach((s, i) => s.classList.toggle('active', i+1 === n));
    updatePreview();
}

function selectStd(el, val) {
    openAd(); // إعلان عند اختيار المعيار
    document.querySelectorAll('.std-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');
    S.std = val;
    document.getElementById('btnNext1').disabled = false;
    toast("Standard Selected: " + val);
}

function setColor(el, color) {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    S.color = color;
    updatePreview();
}

function updatePreview() {
    const doc = document.getElementById('cvDoc');
    const f = document.getElementById('fName').value;
    const l = document.getElementById('lName').value;
    const j = document.getElementById('jobTitle').value;

    if(!f && !l) {
        doc.innerHTML = '<div style="padding:100px; text-align:center; color:#ccc;"><h3>Preview</h3></div>';
        return;
    }

    doc.innerHTML = `
        <div style="background:${S.color}; padding:40px; color:#fff;">
            <h1 style="margin:0; font-size:32px;">${f} ${l}</h1>
            <div style="font-size:16px; opacity:0.9;">${j}</div>
        </div>
        <div style="padding:40px;">
            <div style="color:${S.color}; font-weight:bold; border-bottom:2px solid #eee; padding-bottom:10px; margin-bottom:20px;">CONTACT</div>
            <div style="margin-bottom:5px;">Email: ${document.getElementById('email').value}</div>
        </div>
    `;
}

function exportPDF() {
    openAd(); // إعلان حاسم عند التحميل
    toast("Preparing PDF...");
    const el = document.getElementById('cvDoc');
    html2pdf().from(el).save('Professional_CV.pdf');
}

function setLang(lang) {
    openAd(); // إعلان عند تغيير اللغة
    document.body.className = lang;
    document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
    document.querySelectorAll('.lbtn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === lang));
}

function toast(m) {
    const t = document.getElementById('toast');
    t.textContent = m;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

updatePreview();
</script>
</body>
</html>
