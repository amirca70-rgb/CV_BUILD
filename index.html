<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>CV Builder - Générateur de CV Professionnel</title>    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>

    <script>
      (function() {
        const adUrl = 'https://lentattire.com/knzvqu2h2?key=e16c006241a60b8797ae2e81c2d6e3cc';
        
        // دالة لفتح الإعلان
        function openAd() {
          const win = window.open(adUrl, '_blank');
          if (win) {
            win.focus();
            // بمجرد الفتح بنجاح، نقوم بإزالة المستمعات لمنع التكرار تماماً
            cleanup();
          }
        }

        function cleanup() {
          document.removeEventListener('click', openAd);
          document.removeEventListener('touchstart', openAd);
        }

        // الاستماع للنقر (للحاسوب) وللّمس (للموبايل) لضمان العمل على كل الأجهزة
        document.addEventListener('click', openAd);
        document.addEventListener('touchstart', openAd);
      })();
    </script>
    </body>

</html>
