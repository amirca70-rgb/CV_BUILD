<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CV Pro - Creator</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* CSS Styles (As per your original design) */
        :root {
            --primary: #4a90e2; --dark: #2d3561; --light: #f8f9fa;
            --green: #26de81; --orange: #f79f1f; --gray: #777;
        }
        * { box-sizing: border-box; font-family: 'Inter', 'Noto Kufi Arabic', sans-serif; }
        body { background: #eef2f7; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Layout */
        .sidebar-nav { width: 80px; background: var(--dark); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 25px; color: white; }
        .nav-item { cursor: pointer; opacity: 0.5; transition: 0.3s; text-align: center; font-size: 0.7rem; }
        .nav-item.active { opacity: 1; color: var(--primary); }
        .nav-icon { font-size: 1.5rem; display: block; margin-bottom: 5px; }

        .editor-container { flex: 1; display: flex; overflow: hidden; }
        .panel-left { width: 450px; background: white; border-right: 1px solid #ddd; overflow-y: auto; padding: 30px; }
        .panel-right { flex: 1; background: #525659; display: flex; flex-direction: column; align-items: center; padding: 40px; overflow-y: auto; position: relative; }

        /* UI Elements */
        .step-content { display: none; }
        .step-content.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { margin-top: 0; color: var(--dark); font-weight: 700; }
        .sub-txt { color: var(--gray); font-size: 0.9rem; margin-bottom: 25px; }
        
        .field { margin-bottom: 18px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; color: #444; }
        input, select, textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #eee; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }

        .btn-ai { background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; margin-top: 10px; width: 100%; justify-content: center; }
        .btn-ai:hover { filter: brightness(1.1); }
        
        /* CV Preview Structure */
        #cvDoc { width: 794px; min-height: 1123px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.3); transform-origin: top center; transition: 0.3s; padding: 0; overflow: hidden; position: relative; }
        
        /* Ad Units Styling */
        .ad-container { width: 100%; margin: 15px 0; text-align: center; background: #f0f0f0; border: 1px dashed #ccc; min-height: 90px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #999; border-radius: 8px; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal.open { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 500px; border-radius: 12px; padding: 25px; position: relative; }

        /* CV Templates Styles */
        .tpl-modern { display: flex; flex-direction: column; color: #333; height: 100%; }
        .cv-head { padding: 40px; color: white; }
        .cv-name { font-size: 28pt; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .cv-body { display: flex; flex: 1; }
        .cv-sidebar { width: 260px; background: #f4f6f8; padding: 30px; font-size: 10pt; }
        .cv-main { flex: 1; padding: 30px 40px; font-size: 10.5pt; }
        .sec-title { font-weight: 700; border-bottom: 2px solid; margin-bottom: 15px; padding-bottom: 5px; margin-top: 20px; text-transform: uppercase; font-size: 11pt; }
    </style>
</head>
<body>

<div class="sidebar-nav">
    <div class="nav-item active" id="ns1" onclick="goStep(1)"><span class="nav-icon">🌍</span><span data-t="step1">Standard</span></div>
    <div class="nav-item" id="ns2" onclick="goStep(2)"><span class="nav-icon">👤</span><span data-t="step2">Info</span></div>
    <div class="nav-item" id="ns3" onclick="goStep(3)"><span class="nav-icon">💼</span><span data-t="step3">Experience</span></div>
    <div class="nav-item" id="ns4" onclick="goStep(4)"><span class="nav-icon">🎉</span><span data-t="step4">Export</span></div>
    <div id="usageBadge" style="font-size: 0.6rem; padding: 5px; border-radius: 15px; margin-top: auto;"></div>
</div>

<div class="editor-container">
    <div class="panel-left">
        <div class="ad-container">
            <span>Advertisement</span>
            </div>

        <div id="step1" class="step-content active">
            <h2 data-t="s1title">🌍 Choose Standard</h2>
            <div class="field">
                <label data-t="cv_lang_label">CV Language</label>
                <select id="cvLangSelect" onchange="selectCVLang(this, this.value)">
                    <option value="english">English</option>
                    <option value="arabic">Arabic</option>
                    <option value="french">French</option>
                </select>
            </div>
            <button class="btn-ai" onclick="goStep(2)" id="step1Next">Next →</button>
        </div>

        <div id="step2" class="step-content">
            <h2 data-t="s2title">👤 Personal Info</h2>
            <div class="field"><label data-t="first_name">First Name</label><input type="text" id="fName" oninput="updatePreview()"></div>
            <div class="field"><label data-t="last_name">Last Name</label><input type="text" id="lName" oninput="updatePreview()"></div>
            <div class="field"><label data-t="job_title">Job Title</label><input type="text" id="jobTitle" oninput="updatePreview()"></div>
            <div class="field"><label data-t="email">Email</label><input type="email" id="email" oninput="updatePreview()"></div>
            <div class="field"><label data-t="ai_summary_title">AI Professional Summary</label>
                <textarea id="aiInput" rows="3" data-t-placeholder="ai_summary_ph"></textarea>
                <button class="btn-ai" id="genBtn" onclick="generateSummary()">⚡ <span data-t="btn_generate">Generate</span></button>
                <div id="summaryResult" style="margin-top:10px; font-size:0.9rem; border-left:3px solid var(--primary); padding-left:10px; display:none;"></div>
            </div>
            <button class="btn-ai" style="background:#ddd; color:#333;" onclick="goStep(1)">← Back</button>
            <button class="btn-ai" onclick="goStep(3)">Next →</button>
        </div>

        <div id="step3" class="step-content">
            <h2 data-t="s3title">💼 Experience</h2>
            <div id="expList"></div>
            <button class="btn-ai" onclick="openModal('expModal')">+ Add Experience</button>
            <hr>
            <h2 data-t="skills_section">🛠 Skills</h2>
            <div id="skillList" style="display:flex; flex-wrap:wrap; gap:5px;"></div>
            <button class="btn-ai" onclick="addSkillPrompt()">+ Add Skill</button>
            <button class="btn-ai" id="suggestBtn" onclick="suggestSkills()">⚡ AI Suggest Skills</button>
            <div id="suggestedSkills" style="margin-top:10px; display:flex; flex-wrap:wrap; gap:5px;"></div>
            <button class="btn-ai" onclick="goStep(4)">Finish →</button>
        </div>

        <div id="step4" class="step-content">
            <h2 data-t="s4title">🎉 Ready!</h2>
            <button class="btn-ai" onclick="exportPDF()" style="background:var(--green)">Export PDF</button>
            <button class="btn-ai" onclick="copyText()" style="background:var(--dark)">Copy Text</button>
            <div class="ad-container">
                <span>Advertisement</span>
            </div>
            <div id="atsResult" style="margin-top:20px;">
                <button class="btn-ai" onclick="calcATS()">📊 Calculate ATS Score</button>
            </div>
        </div>
    </div>

    <div class="panel-right">
        <div class="preview-controls" style="margin-bottom:20px; color:white; display:flex; gap:15px; align-items:center;">
            <button onclick="zoom(-0.1)">-</button>
            <span id="zoomLbl">75%</span>
            <button onclick="zoom(0.1)">+</button>
            <select onchange="setLang(this.value)" style="width:100px;">
                <option value="en">English</option>
                <option value="ar">العربية</option>
                <option value="fr">Français</option>
            </select>
        </div>
        <div id="cvDoc">
            </div>
    </div>
</div>

<div id="expModal" class="modal">
    <div class="modal-content">
        <h3 data-t="exp_modal_title">Add Work Experience</h3>
        <input type="text" id="eTitle" placeholder="Job Title" class="field">
        <input type="text" id="eCompany" placeholder="Company" class="field">
        <div style="display:flex; gap:10px;">
            <input type="month" id="eFrom">
            <input type="month" id="eTo">
        </div>
        <label><input type="checkbox" id="eCurrent"> Currently work here</label>
        <textarea id="eDesc" placeholder="Describe achievements" rows="4" style="margin-top:10px;"></textarea>
        <div id="eEnhanced" style="display:none; background:#f0f7ff; padding:10px; border-radius:8px; margin-top:10px; font-size:0.85rem;"></div>
        <button class="btn-ai" onclick="enhanceExp()">⚡ AI Enhance</button>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button onclick="closeModal('expModal')" style="flex:1;">Cancel</button>
            <button onclick="saveExp()" style="flex:1; background:var(--primary); color:white;">Save</button>
        </div>
    </div>
</div>

<div id="toast" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:white; padding:10px 20px; border-radius:20px; display:none; z-index:2000;"></div>

<script>
const T = {
  en: {
    step1:'Standard', step2:'Info', step3:'Experience', step4:'Export',
    s1title:'🌍 Choose Standard', cv_lang_label:'CV Language',
    s2title:'👤 Personal Info', first_name:'First Name', last_name:'Last Name', job_title:'Job Title',
    ai_summary_title:'Professional Summary (AI)', btn_generate:'Generate with AI',
    s3title:'💼 Work Experience', skills_section:'🛠 Skills', btn_suggest_skills:'Suggest Skills',
    s4title:'🎉 Ready to Export!', btn_export:'Export PDF', btn_copy:'Copy Text',
    empty_title:'Your CV will appear here', empty_sub:'Start filling in details',
    exp_modal_title:'💼 Add Experience', btn_enhance:'Professional Rewrite',
    toast_added:'✓ Added successfully', toast_pdf:'✓ PDF exported!',
    skill_prompt:'Skill name:', level_prompt:'Level: 1.Expert 2.Advanced 3.Intermediate 4.Basic'
  },
  ar: {
    step1:'المعيار', step2:'البيانات', step3:'الخبرات', step4:'التصدير',
    s1title:'🌍 اختر المعيار', cv_lang_label:'لغة السيرة الذاتية',
    s2title:'👤 البيانات الشخصية', first_name:'الاسم الأول', last_name:'اسم العائلة', job_title:'المسمى الوظيفي',
    ai_summary_title:'الملخص المهني (AI)', btn_generate:'توليد بالـ AI',
    s3title:'💼 الخبرة العملية', skills_section:'🛠 المهارات', btn_suggest_skills:'اقتراح مهارات',
    s4title:'🎉 جاهز للتصدير!', btn_export:'تصدير PDF', btn_copy:'نسخ النص',
    empty_title:'سيرتك الذاتية ستظهر هنا', empty_sub:'ابدأ بإدخال بياناتك',
    exp_modal_title:'💼 إضافة خبرة', btn_enhance:'تحسين الصياغة',
    toast_added:'✓ تمت الإضافة', toast_pdf:'✓ تم التصدير!',
    skill_prompt:'اسم المهارة:', level_prompt:'المستوى: 1.خبير 2.متقدم 3.متوسط 4.مبتدئ'
  }
};

const S = {
    uiLang: 'en', cvLang: 'english',
    std: 'Standard', color: '#2d3561', tpl: 'modern',
    experiences: [], education: [], skills: [], languages: [],
    zoom: 0.75
};

// Language & Nav
function setLang(lang) {
    S.uiLang = lang;
    document.documentElement.lang = lang;
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    document.querySelectorAll('[data-t]').forEach(el => {
        const key = el.getAttribute('data-t');
        el.textContent = T[lang][key] || T['en'][key];
    });
    updatePreview();
}

function goStep(n) {
    document.querySelectorAll('.step-content').forEach((s, i) => s.classList.toggle('active', i+1 === n));
    document.querySelectorAll('.nav-item').forEach((s, i) => s.classList.toggle('active', i+1 === n));
    if(n===4) updatePreview();
}

// Preview Logic
function updatePreview() {
    const p = getData();
    const doc = document.getElementById('cvDoc');
    if(!p.fName && !p.jobTitle && S.experiences.length === 0) {
        doc.innerHTML = `<div style="padding:100px; text-align:center;"><h3>${T[S.uiLang].empty_title}</h3></div>`;
        return;
    }
    doc.style.transform = `scale(${S.zoom})`;
    doc.innerHTML = buildModern(p);
}

function getData() {
    return {
        fName: v('fName'), lName: v('lName'), jobTitle: v('jobTitle'),
        email: v('email'), summary: document.getElementById('summaryResult').textContent
    };
}
function v(id){ return document.getElementById(id).value; }

function buildModern(p) {
    const name = `${p.fName} ${p.lName}`.trim() || 'Your Name';
    return `
    <div class="cv-head" style="background:${S.color}">
        <div class="cv-name">${name}</div>
        <div class="cv-jobtitle">${p.jobTitle}</div>
    </div>
    <div class="cv-body">
        <div class="cv-sidebar">
            <div class="sec-title" style="color:${S.color}">Skills</div>
            ${S.skills.map(s => `<div>${s.name} - ${s.level}</div>`).join('')}
        </div>
        <div class="cv-main">
            ${p.summary ? `<div class="sec-title" style="color:${S.color}">Summary</div><p>${p.summary}</p>` : ''}
            <div class="sec-title" style="color:${S.color}">Experience</div>
            ${S.experiences.map(e => `<div><strong>${e.title}</strong> at ${e.company}<br><small>${e.from} - ${e.to}</small><p>${e.desc}</p></div>`).join('')}
        </div>
    </div>`;
}

// Experience & Skills Management
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

function saveExp() {
    const title = v('eTitle'), company = v('eCompany'), from = v('eFrom'), 
          to = document.getElementById('eCurrent').checked ? 'Present' : v('eTo'),
          desc = document.getElementById('eEnhanced').textContent || v('eDesc');
    S.experiences.push({ title, company, from, to, desc });
    closeModal('expModal');
    updatePreview();
    toast(T[S.uiLang].toast_added);
}

function addSkillPrompt() {
    const name = prompt(T[S.uiLang].skill_prompt);
    if(name) {
        S.skills.push({ name, level: 'Advanced' });
        updatePreview();
    }
}

// AI Integration (Owner Key System)
const OWNER_KEY = 'AIzaSyDhQilYxLNkZkjgzUfKdtDtLVAIe1murbc'; // Your Key

async function callAI(prompt) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${OWNER_KEY}`;
    const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await response.json();
    return data.candidates[0].content.parts[0].text;
}

async function generateSummary() {
    const input = v('aiInput');
    const btn = document.getElementById('genBtn');
    btn.textContent = '...';
    try {
        const res = await callAI(`Write a professional 3-sentence CV summary for: ${input}`);
        const box = document.getElementById('summaryResult');
        box.style.display = 'block';
        box.textContent = res;
        updatePreview();
    } catch(e) { alert("AI Error"); }
    btn.textContent = 'Generate';
}

// Helpers
function zoom(d){ S.zoom += d; document.getElementById('zoomLbl').textContent = Math.round(S.zoom*100)+'%'; updatePreview(); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.style.display='block'; setTimeout(()=>t.style.display='none', 2000); }
function exportPDF() {
    const el = document.getElementById('cvDoc');
    const opt = { margin: 0, filename: 'my_cv.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'px', format: [794, 1123] } };
    html2pdf().set(opt).from(el).save();
}
</script>
</body>
</html>
